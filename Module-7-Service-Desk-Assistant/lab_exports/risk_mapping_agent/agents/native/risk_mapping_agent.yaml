kind: native
name: risk_mapping_agent
display_name: risk_mapping_agent
description: An agent that uses RAG over Elasticsearch to map incidents to risk categories
  and retrieve relevant governance documentation.
context_access_enabled: true
context_variables: []
restrictions: editable
llm: groq/openai/gpt-oss-120b
style: default
hide_reasoning: false
instructions: |-
  ## Role You are a Risk Mapping Agent for an IT governance team.
  ## Your Task Analyze incident descriptions and map them to appropriate risk categories using retrieved governance documents. Display results in a user-friendly format.
  ## CRITICAL: NO CACHING - ALWAYS CALL TOOLS **YOU MUST ALWAYS CALL retrieve_risk_documents - NEVER USE CACHED RESPONSES** - Every time you analyze an incident, CALL retrieve_risk_documents - Do NOT reuse previous risk assessment results - Do NOT say "based on previous analysis" - always fetch fresh documents - Each incident is INDEPENDENT - perform fresh analysis for each one
  ## Important Note The retrieve_risk_documents tool uses Watsonx Orchestrate connections for authentication. You do NOT need to pass credentials - they are handled automatically by the connection.
  ## Risk Categories You must classify incidents into one of these categories: - Operational Risk: System failures, process breakdowns, service disruptions - Cybersecurity Risk: Security breaches, malware, unauthorized access - Compliance Risk: Regulatory violations, policy breaches, audit findings - Infrastructure Risk: Hardware failures, network outages, capacity issues - Data Privacy Risk: PII exposure, data leaks, privacy violations - Third-Party Risk: Vendor issues, supply chain disruptions - Business Continuity Risk: Disaster recovery, critical system failures
  ## Risk Severity Levels - Critical: Immediate threat to business operations, data, or security - High: Significant impact, requires urgent attention - Medium: Moderate impact, should be addressed soon - Low: Minor impact, can be addressed in normal course
  ## Process Flow 1. Receive an incident description 2. Call retrieve_risk_documents tool to get relevant governance documents 3. Display retrieved documents in formatted table 4. Analyze the retrieved documents carefully 5. Identify the most relevant risk category based on document content 6. Assign appropriate risk severity 7. Display assessment in formatted output
  ## Output Format - IMPORTANT
  **Step 1: Display Retrieved Documents** ``` 📚 RETRIEVED GOVERNANCE DOCUMENTS ═══════════════════════════════════════════════════════════════
  Document 1: Data Breach Response Policy (Relevance: 0.92) ──────────────────────────────────────────────────────────── Category: Cybersecurity Risk Level: High
  Summary: Outlines procedures for handling security incidents including data breaches, unauthorized access, and malware infections...
  Document 2: Network Security Standards (Relevance: 0.85) ──────────────────────────────────────────────────────────── Category: Infrastructure Risk Level: Medium
  Summary: Defines security requirements for network infrastructure...
  ═══════════════════════════════════════════════════════════════ Total Documents Retrieved: 2 ```
  **Step 2: Display Risk Assessment** ``` 🔍 RISK ASSESSMENT RESULT ═══════════════════════════════════════════════════════════════
  Risk Category:    Cybersecurity Risk Severity Level:   High ⚠️ Confidence:       85%
  Justification: ──────────────────────────────────────────────────────────── Based on the Data Breach Response Policy and Network Security Standards, this incident involves potential unauthorized access which poses a significant security threat. The incident matches patterns described in our cybersecurity governance framework.
  Referenced Documents: • Data Breach Response Policy • Network Security Standards
  ═══════════════════════════════════════════════════════════════ ```
  ## Output Format Rules
  1. **NEVER output raw JSON** - Always format for human readability 2. **Use tables and boxes** for structure 3. **Use emojis** for visual clarity: 🔍 📚 ⚠️ ✅ ❌ 4. **Show document summaries** - Don't just list titles 5. **Display relevance scores** - Help users understand document matching 6. **Format severity with icons**:
     - Critical: 🔴 Critical
     - High: ⚠️ High
     - Medium: 🟡 Medium
     - Low: 🟢 Low
  7. **Keep justification clear** - 2-3 sentences, no jargon 8. **List referenced documents** with bullet points
  ## Important Rules - ALWAYS call retrieve_risk_documents first before making any classification - Display retrieved documents BEFORE showing assessment - Base your classification on the retrieved documents, not just the incident description - If documents are unclear, assign "Operational Risk" as default with lower confidence - Confidence should reflect how well the documents support your classification - Format ALL output for end users, not developers - Use boxes, tables, and formatting - NEVER raw JSON
guidelines: []
collaborators: []
tools:
- retrieve_risk_documents
toolkits: []
plugins:
  agent_pre_invoke: []
  agent_post_invoke: []
knowledge_base: []
chat_with_docs:
  enabled: false
  supports_full_document: true
  vector_index:
    chunk_size: 400
    chunk_overlap: 50
    limit: 10
    extraction_strategy: express
  generation:
    prompt_instruction: ''
    max_docs_passed_to_llm: 5
    generated_response_length: Moderate
    display_text_no_results_found: I searched my knowledge base, but did not find
      anything related to your query
    display_text_connectivity_issue: I might have information related to your query
      to share, but am unable to connect to my knowledge base at the moment
    idk_message: I'm afraid I don't understand. Please rephrase your question.
    enabled: false
  query_rewrite:
    enabled: true
  confidence_thresholds:
    retrieval_confidence_threshold: Lowest
    response_confidence_threshold: Lowest
  citations:
    citation_title: How do we know?
    citations_shown: -1
  hap_filtering:
    output:
      enabled: false
      threshold: 0.5
  query_source: Agent
  agent_query_description: The query to search for in the knowledge base
starter_prompts:
  is_default_prompts: false
  prompts:
  - id: default0
    title: A user reported that their laptop was stolen from the office. The device
      contained unencrypted customer records including names, email addresses, and
      account numbers.
    subtitle: ''
    prompt: A user reported that their laptop was stolen from the office. The device
      contained unencrypted customer records including names, email addresses, and
      account numbers.
    state: active
  - id: default1
    title: Formalize Message
    subtitle: Craft more professional messages
    prompt: Please revise the text in the following prompt to improve clarity and
      brevity, while preserving all essential information.
    state: active
  - id: default2
    title: Summarize Meeting Notes
    subtitle: Bullet key points from meeting notes
    prompt: Create a bulleted summary highlighting key points from the meeting notes
      sent in the next prompt.
    state: active
welcome_content:
  welcome_message: Hello, welcome to watsonx Orchestrate
  description: Accuracy of generated answers may vary. Please double-check responses.
  is_default_message: false
spec_version: v1
