version: '3.8'

services:
  golang-error-simulator:
    image: ${DOCKER_IMAGE:-162.133.131.244:5050/root/golang-error-simulator}:${DOCKER_TAG:-latest}
    container_name: golang-error-simulator
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - TZ=Asia/Jakarta
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - app-network
    labels:
      - "com.example.description=Golang Error Simulator for Instana Demo"
      - "com.example.version=1.0.0"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    driver: bridge

