---
# ServiceAccount for Jenkins
# This service account is used by Jenkins to deploy applications to OpenShift
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-sa
  namespace: production
  labels:
    app: jenkins
    component: serviceaccount
  annotations:
    description: "Service account for Jenkins CI/CD pipeline"

---
# Role for Jenkins ServiceAccount
# Defines permissions needed for deployment operations
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-deployer
  namespace: production
  labels:
    app: jenkins
    component: role
rules:
  # Permissions for Deployments
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # Permissions for Pods
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "create", "delete"]
  
  # Permissions for Services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # Permissions for ConfigMaps and Secrets
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # Permissions for Routes (OpenShift specific)
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # Permissions for BuildConfigs and Builds (OpenShift specific)
  - apiGroups: ["build.openshift.io"]
    resources: ["buildconfigs", "builds"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # Permissions for ImageStreams (OpenShift specific)
  - apiGroups: ["image.openshift.io"]
    resources: ["imagestreams", "imagestreamtags"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # Permissions for DeploymentConfigs (OpenShift specific)
  - apiGroups: ["apps.openshift.io"]
    resources: ["deploymentconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# RoleBinding for Jenkins ServiceAccount
# Binds the jenkins-deployer role to the jenkins-sa service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-deployer-binding
  namespace: production
  labels:
    app: jenkins
    component: rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-deployer
subjects:
  - kind: ServiceAccount
    name: jenkins-sa
    namespace: production

---
# Additional RoleBinding for edit permissions
# Provides broader edit permissions in the production namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-edit-binding
  namespace: production
  labels:
    app: jenkins
    component: rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: jenkins-sa
    namespace: production

---
# ServiceAccount for Jenkins in Development namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-sa
  namespace: development
  labels:
    app: jenkins
    component: serviceaccount
  annotations:
    description: "Service account for Jenkins CI/CD pipeline in development"

---
# RoleBinding for Jenkins in Development namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-edit-binding
  namespace: development
  labels:
    app: jenkins
    component: rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: jenkins-sa
    namespace: development